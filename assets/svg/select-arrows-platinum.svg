<svg xmlns='http://www.w3.org/2000/svg' width='22' height='18' viewBox='0 0 22 18'>
  <!-- Separator bars (3 vertical lines with bevel effect) -->
  <rect x='0' y='0' width='1' height='18' fill='#B7B7B7'/>
  <rect x='1' y='0' width='1' height='18' fill='#DDDDDD'/>
  <rect x='2' y='0' width='1' height='18' fill='#FFFFFF'/>
  
  <!-- Arrow button background -->
  <rect x='3' y='0' width='19' height='18' fill='#DDDDDD'/>
  
  <!-- Top highlight -->
  <rect x='3' y='0' width='17' height='1' fill='#FFFFFF' fill-opacity='0.5'/>
  
  <!-- Bottom shadow -->
  <rect x='3' y='17' width='17' height='1' fill='#808080' fill-opacity='0.5'/>
  
  <!-- Right shadow -->
  <rect x='21' y='0' width='1' height='18' fill='#808080' fill-opacity='0.5'/>
  
  <!-- Up arrow (small, ~5px wide, centered at x=12) -->
  <path d='M12 5 L15 8 L9 8 Z' fill='#262626'/>
  <!-- Anti-alias fringe for up arrow -->
  <rect x='11.5' y='4.5' width='1' height='0.5' fill='#262626' fill-opacity='0.5'/>
  <rect x='8.5' y='7.5' width='0.5' height='0.5' fill='#262626' fill-opacity='0.3'/>
  <rect x='15' y='7.5' width='0.5' height='0.5' fill='#262626' fill-opacity='0.3'/>
  
  <!-- Down arrow (small, ~5px wide, centered at x=12) -->
  <path d='M12 13 L9 10 L15 10 Z' fill='#262626'/>
  <!-- Anti-alias fringe for down arrow -->
  <rect x='11.5' y='13' width='1' height='0.5' fill='#262626' fill-opacity='0.5'/>
  <rect x='8.5' y='10' width='0.5' height='0.5' fill='#262626' fill-opacity='0.3'/>
  <rect x='15' y='10' width='0.5' height='0.5' fill='#262626' fill-opacity='0.3'/>
</svg>
